<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explainable Resume Screening</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">Resume Screener</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('recruiter') }}">Recruiter Mode</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('applicant') }}">Applicant Mode</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-warning">{{ messages[0] }}</div>
  {% endif %}
{% endwith %}
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
