{% extends "base.html" %}
{% block content %}
<h2>Recruiter Mode</h2>
<p>Upload multiple resumes and paste the job description to rank them.</p>

<form method="POST" enctype="multipart/form-data" class="card p-4 bg-white shadow-sm">
  <div class="mb-3">
    <label class="form-label">Job Description (plain text)</label>
    <textarea name="job_description" class="form-control" rows="5" required></textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Resumes (PDF or TXT)</label>
    <input type="file" name="resumes" multiple accept=".pdf,.txt" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-primary">Screen Resumes</button>
</form>
{% endblock %}
